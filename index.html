<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint: #a8e6cf;
      --white: #ffffff;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.09);
      --card-hover: rgba(255,255,255,0.09);
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: var(--white);
    }

    /* ── BACKGROUND VIDEO ── */
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    #bg-video.visible { opacity: 1; }

    /* very light overlay — just enough to keep text readable */
    #overlay {
      position: fixed; inset: 0;
      background: transparent;
      z-index: 1;
    }

    /* ── ENTER SCREEN ── */
    #enter-screen {
      position: fixed; inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    /* enter screen bg is the video too */
    #enter-screen-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 99;
      pointer-events: none;
    }
    #enter-screen-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 99;
      pointer-events: none;
    }
    #enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-glow {
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,230,207,0.15) 0%, transparent 70%);
      position: absolute;
      z-index: 101;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .enter-avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 2.5px solid rgba(168,230,207,0.7);
      object-fit: cover;
      position: relative;
      z-index: 102;
      box-shadow: 0 0 28px rgba(168,230,207,0.35);
      overflow: hidden;
      flex-shrink: 0;
    }
    .enter-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .enter-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 16px;
      position: relative; z-index: 102;
      color: var(--white);
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .enter-hint {
      margin-top: 10px;
      font-size: 0.76rem;
      color: var(--mint);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative; z-index: 102;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.35; } 50% { opacity: 1; }
    }

    /* ── PARTICLES ── */
    #particles {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }

    /* ── PROFILE ── */
    #profile-scroll {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
      pointer-events: none;
    }
    #profile-scroll.visible {
      opacity: 1;
      pointer-events: all;
    }

    .profile-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 420px;
      width: 100%;
      padding: 0 20px;
    }

    /* ── DISCORD CARD ── */
    .discord-card {
      width: 100%;
      background: rgba(0,0,0,0.12);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px 20px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      
    }

    .dc-avatar-wrap { position: relative; flex-shrink: 0; }
    .dc-avatar {
      width: 62px; height: 62px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(168,230,207,0.3);
      box-shadow: 0 0 16px rgba(168,230,207,0.2);
    }
    .dc-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .dc-status {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #3ba55d;
      border: 2px solid rgba(0,0,0,0.3);
    }

    .dc-info { flex: 1; min-width: 0; }
    .dc-name-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .dc-username {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--white);
      text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    }
    .dc-badge {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      display: flex; align-items: center; gap: 3px;
    }
    .dc-badge svg { width: 8px; height: 8px; }

    .dc-status-text {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
      display: flex; align-items: center; gap: 5px;
    }
    .dc-status-text::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mint);
      flex-shrink: 0;
    }
  </style>
</head>

</video>

<!-- Enter screen also plays the video -->
<video id="enter-screen-video" autoplay loop muted playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>
<div id="enter-screen-overlay"></div>

<div id="overlay"></div>
<canvas id="particles"></canvas>

<!-- Audio -->
<audio id="bg-music" loop>
  <source src="UZI.mp3" type="audio/mpeg">
</audio>

<script>
  // Particles
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 35; i++) {
    particles.push({ x: Math.random()*2000, y: Math.random()*2000, r: Math.random()*1.6+0.3, vx: (Math.random()-0.5)*0.22, vy: -Math.random()*0.3-0.1, o: Math.random()*0.4+0.08 });
  }
  function drawParticles() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x%W, p.y%H, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(168,230,207,${p.o})`; ctx.fill();
      p.x += p.vx; p.y += p.vy; if(p.y<0) p.y=H;
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  function enterProfile() {
    document.getElementById('enter-screen').classList.add('hidden');
    document.getElementById('enter-screen-video').style.display = 'none';
    document.getElementById('enter-screen-overlay').style.display = 'none';
    document.getElementById('bg-video').classList.add('visible');
    document.getElementById('profile-scroll').classList.add('visible');
    const music = document.getElementById('bg-music');
    music.volume = 0.55;
    music.play().catch(()=>{});
  }

  // hide enter-screen elements style
  document.getElementById('enter-screen').style.zIndex = '102';
</script>
